name: Scheduled Scraper Run

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6:00 AM UTC

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      run: |
        python 1_headless_browser/playwright_basic_scraper.py